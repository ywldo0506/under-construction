<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뚝딱뚝딱 공사중!</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #FFD600;
    --black: #111111;
    --orange: #FF6B2B;
    --white: #FAFAF5;
    --stripe1: #FFD600;
    --stripe2: #111111;
  }

  body {
    background-color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* 배경 사선 줄무늬 */
  .stripe-bg {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      var(--stripe1) 0px,
      var(--stripe1) 30px,
      var(--stripe2) 30px,
      var(--stripe2) 60px
    );
    opacity: 0.06;
    z-index: 0;
    animation: moveStripes 6s linear infinite;
  }
  @keyframes moveStripes {
    from { background-position: 0 0; }
    to { background-position: 84px 0; }
  }

  /* 중앙 카드 */
  .card {
    position: relative;
    z-index: 2;
    background: var(--white);
    border: 4px solid var(--black);
    border-radius: 24px;
    padding: 56px 48px 48px;
    max-width: 480px;
    width: 90vw;
    text-align: center;
    box-shadow: 10px 10px 0px var(--yellow);
    animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* 상단 경고 테이프 */
  .tape {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--yellow);
    color: var(--black);
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-weight: 900;
    font-size: 13px;
    letter-spacing: 3px;
    padding: 6px 28px;
    border: 3px solid var(--black);
    border-radius: 4px;
    white-space: nowrap;
  }

  /* 헬멧 아이콘 영역 */
  .icon-area {
    margin-bottom: 24px;
    position: relative;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .helmet {
    animation: helmetBounce 1.4s ease-in-out infinite;
    filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.2));
  }
  @keyframes helmetBounce {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50% { transform: translateY(-14px) rotate(4deg); }
  }

  .wrench {
    position: absolute;
    right: 80px;
    bottom: 8px;
    animation: wrenchSwing 1.2s ease-in-out infinite;
    transform-origin: top center;
  }
  @keyframes wrenchSwing {
    0%, 100% { transform: rotate(-25deg); }
    50% { transform: rotate(25deg); }
  }

  .spark {
    position: absolute;
    left: 80px;
    top: 12px;
    animation: sparkPop 1s ease-in-out infinite;
  }
  @keyframes sparkPop {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.6); }
  }

  /* 메인 제목 */
  .main-title {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-weight: 900;
    font-size: 42px;
    color: var(--black);
    line-height: 1.1;
    margin-bottom: 8px;
    animation: titlePulse 2.4s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .main-title span {
    color: var(--orange);
  }

  /* 서브 텍스트 */
  .sub-text {
    font-size: 15px;
    color: #555;
    line-height: 1.8;
    margin-bottom: 32px;
  }

  /* 진행 바 */
  .progress-wrap {
    background: #E8E8E0;
    border: 2px solid var(--black);
    border-radius: 99px;
    height: 16px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-bar {
    height: 100%;
    background: repeating-linear-gradient(
      90deg,
      var(--yellow) 0px,
      var(--yellow) 20px,
      var(--orange) 20px,
      var(--orange) 40px
    );
    border-radius: 99px;
    animation: progressAnim 3s ease-in-out infinite alternate;
    background-size: 40px 100%;
    animation: progressSlide 1.2s linear infinite, progressGrow 6s ease-in-out infinite alternate;
  }
  @keyframes progressSlide {
    from { background-position: 0 0; }
    to { background-position: 40px 0; }
  }
  @keyframes progressGrow {
    from { width: 20%; }
    to { width: 82%; }
  }

  .progress-label {
    font-size: 12px;
    color: #888;
    text-align: right;
    letter-spacing: 0.5px;
  }

  /* 하단 마퀴 배너 */
  .banner-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--yellow);
    border-top: 3px solid var(--black);
    overflow: hidden;
    padding: 10px 0;
    z-index: 10;
  }
  .banner-track {
    display: flex;
    animation: marquee 14s linear infinite;
    white-space: nowrap;
  }
  .banner-item {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-weight: 900;
    font-size: 16px;
    color: var(--black);
    padding: 0 32px;
    letter-spacing: 1px;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* 상단 경광등 */
  .lights {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    z-index: 10;
  }
  .light {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid var(--black);
    animation: blink 1s ease-in-out infinite;
  }
  .light:nth-child(odd) { background: #E24B4A; }
  .light:nth-child(even) { background: var(--yellow); animation-delay: 0.5s; }
  @keyframes blink {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px currentColor; }
    50% { opacity: 0.2; box-shadow: none; }
  }
</style>
</head>
<body>

<div class="stripe-bg"></div>

<!-- 상단 경광등 -->
<div class="lights">
  <div class="light"></div>
  <div class="light"></div>
  <div class="light"></div>
  <div class="light"></div>
  <div class="light"></div>
</div>

<!-- 메인 카드 -->
<div class="card">
  <div class="tape">⚠ UNDER CONSTRUCTION ⚠</div>

  <div class="icon-area">
    <!-- 스파크 -->
    <svg class="spark" width="32" height="32" viewBox="0 0 32 32">
      <polygon points="16,2 19,13 30,13 21,20 24,30 16,23 8,30 11,20 2,13 13,13" fill="#FFD600" stroke="#111" stroke-width="2"/>
    </svg>

    <!-- 헬멧 -->
    <svg class="helmet" width="90" height="80" viewBox="0 0 90 80">
      <ellipse cx="45" cy="58" rx="38" ry="10" fill="#BA7517"/>
      <path d="M7 58 Q7 20 45 16 Q83 20 83 58 Z" fill="#FFD600"/>
      <rect x="7" y="54" width="76" height="9" rx="4.5" fill="#BA7517"/>
      <rect x="30" y="26" width="30" height="10" rx="5" fill="#E24B4A"/>
    </svg>

    <!-- 렌치 -->
    <svg class="wrench" width="28" height="60" viewBox="0 0 28 60">
      <rect x="11" y="14" width="6" height="42" rx="3" fill="#888"/>
      <ellipse cx="14" cy="14" rx="9" ry="6" fill="#B4B2A9"/>
      <ellipse cx="14" cy="56" rx="9" ry="6" fill="#B4B2A9"/>
      <rect x="11" y="8" width="6" height="6" fill="#888"/>
    </svg>
  </div>

  <div class="main-title">뚝딱<span>뚝딱</span><br>공사중!</div>

  <p class="sub-text">
    더 멋진 모습으로 곧 돌아올게요 🔨<br>
    잠시만 기다려주세요!
  </p>

  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>
  <div class="progress-label">열심히 만드는 중...</div>
</div>

<!-- 하단 마퀴 배너 -->
<div class="banner-wrap">
  <div class="banner-track">
    <span class="banner-item">🔨 공사중</span>
    <span class="banner-item">⚙️ 열심히 만드는 중</span>
    <span class="banner-item">🏗️ 공사중</span>
    <span class="banner-item">🔧 준비 중</span>
    <span class="banner-item">⚠️ UNDER CONSTRUCTION</span>
    <span class="banner-item">🪚 공사중</span>
    <span class="banner-item">🔨 공사중</span>
    <span class="banner-item">⚙️ 열심히 만드는 중</span>
    <span class="banner-item">🏗️ 공사중</span>
    <span class="banner-item">🔧 준비 중</span>
    <span class="banner-item">⚠️ UNDER CONSTRUCTION</span>
    <span class="banner-item">🪚 공사중</span>
  </div>
</div>

</body>
</html>
